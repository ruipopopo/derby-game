<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <style>
    body { background-color: #f4f6f9; font-family: 'Helvetica Neue', Arial, sans-serif; }
    .main-container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .tab-content { display: none; }
    .tab-content.is-active { display: block; }
    .odds-card { background: #fff; padding: 10px; margin-bottom: 5px; border-left: 5px solid #3273dc; display: flex; justify-content: space-between; }
    .hero.is-info { background: linear-gradient(135deg, #209cee, #114e7a); }
  </style>
</head>
<body>

<div class="main-container">
  <section class="hero is-info is-small is-bold mb-4 rounded">
    <div class="hero-body">
      <h1 class="title">🎯 優先順位予想競馬ポータル</h1>
      <p class="subtitle is-6">現在のステータス: <span id="current-status-tag" class="tag is-warning">読み込み中...</span></p>
      <div id="user-info-bar" class="is-size-6 has-text-weight-bold"></div>
    </div>
  </section>

  <div class="tabs is-boxed is-centered">
    <ul>
      <li id="tab-link-player-select" class="is-active"><a onclick="switchTab('player-select')">👤 ログイン</a></li>
      <li id="tab-link-host"><a onclick="switchTab('host')">👑 ホスト</a></li>
      <li id="tab-link-respondent"><a onclick="switchTab('respondent')">📝 回答入力</a></li>
      <li id="tab-link-bet"><a onclick="switchTab('bet')">🐎 予想投票</a></li>
      <li id="tab-link-info"><a onclick="switchTab('info')">📊 オッズ・情報</a></li>
      <li id="tab-link-result"><a onclick="switchTab('result')">🏆 結果発表</a></li>
    </ul>
  </div>

  <div id="tab-player-select" class="tab-content is-active card p-5">
    <h2 class="title is-4">プレイヤー名を選択</h2>
    <div class="field">
      <label class="label">あなたの名前</label>
      <div class="control">
        <div class="select is-fullwidth">
          <select id="player-dropdown" onchange="onUserSelect()">
            <option value="">-- 選択してください --</option>
          </select>
        </div>
      </div>
    </div>
    <article class="message is-info">
      <div class="message-body is-size-6">
        名前を選択すると、権限に応じて各画面が解放されます。
      </div>
    </article>
  </div>

  <div id="tab-host" class="tab-content card p-5">
    <h2 class="title is-4">👑 ホスト管理パネル</h2>
    <div class="field">
      <label class="label">お題（質問）</label>
      <div class="control"><input id="host-theme" class="input" type="text" placeholder="例：一番大切にしたい人生の価値観は？"></div>
    </div>
    <label class="label">選択肢（6つ入力してください）</label>
    <div class="columns is-multiline">
      <div class="column is-6"><input id="opt-0" class="input" type="text" placeholder="選択肢 1"></div>
      <div class="column is-6"><input id="opt-1" class="input" type="text" placeholder="選択肢 2"></div>
      <div class="column is-6"><input id="opt-2" class="input" type="text" placeholder="選択肢 3"></div>
      <div class="column is-6"><input id="opt-3" class="input" type="text" placeholder="選択肢 4"></div>
      <div class="column is-6"><input id="opt-4" class="input" type="text" placeholder="選択肢 5"></div>
      <div class="column is-6"><input id="opt-5" class="input" type="text" placeholder="選択肢 6"></div>
    </div>
    <div class="field">
      <label class="label">本日の回答ターゲット（プレイヤー）</label>
      <div class="control">
        <div class="select is-fullwidth"><select id="host-respondent-select"></select></div>
      </div>
    </div>
    <div class="buttons">
      <button class="button is-primary is-fullwidth" onclick="hostAction('setup')">🚀 お題・ターゲットを登録してゲーム開始</button>
      <button class="button is-danger is-fullwidth" onclick="hostAction('lock')">🔒 予想受付を締め切る</button>
      <button class="button is-success is-fullwidth" onclick="hostAction('payout')">💰 回答照合＆ポイント清算</button>
      <button class="button is-light is-fullwidth" onclick="hostAction('next')">🔄 次のゲームの準備(リセット)</button>
    </div>
  </div>

  <div id="tab-respondent" class="tab-content card p-5">
    <h2 class="title is-4">📝 あなたの優先順位を入力</h2>
    <p class="subtitle is-6 has-text-danger">※お題に対して自分が思う順位を1位〜6位まで重複なく選んでください。</p>
    <div id="respondent-theme-box" class="notification is-light font-weight-bold">お題がまだ設定されていません。</div>
    <div id="rank-selectors">
      </div>
    <button class="button is-link is-fullwidth mt-4" onclick="submitRespondentAnswer()">📤 順位回答を送信</button>
  </div>

  <div id="tab-bet" class="tab-content card p-5">
    <h2 class="title is-4">🐎 予想ベットシステム</h2>
    <div id="bet-theme-box" class="notification is-light"></div>
    
    <div class="field">
      <label class="label">賭け方（式別）</label>
      <div class="control">
        <div class="select is-fullwidth">
          <select id="bet-type-select"
